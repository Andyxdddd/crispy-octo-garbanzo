version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8081:8080"
    networks:
      - app-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "81:80"
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge